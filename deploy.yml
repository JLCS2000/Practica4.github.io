 name: Build and Deploy

  on:
    push:
      branches:
        - main

  jobs:
    build-and-deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: Build site
          run: python build.py

        - name: Deploy to Cloudflare Pages
          uses: cloudflare/pages-action@v1
          with:
            apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            projectName: practica4
            directory: output
            gitHubToken: ${{ secrets.GITHUB_TOKEN }}

        - name: Notify ntfy.sh
          run: curl -d "New deployment live on Practica4!" https://ntfy.sh/devops-itla

